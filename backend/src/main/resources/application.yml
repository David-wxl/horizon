server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: horizon-backend
  
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/horizon?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: your_password_here  # 请修改为您的MySQL密码
  
  # Jackson配置
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# JWT配置
jwt:
  secret: HORIZON-SECRET-KEY-2024-PLEASE-CHANGE-THIS-TO-A-SECURE-RANDOM-STRING
  expiration: 604800000  # 7天（毫秒）

# Gemini API配置
gemini:
  api-key: your_gemini_api_key_here  # 请替换为您的Gemini API Key
  model: gemini-pro
  proxy-url: https://antigravity.proxy.url  # 如需代理请配置
